<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<title>Prayer App – Enhanced Streak Card</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:#2A9D5C; --green-light:#E8F5EE; --green-mid:#A8D5B5;
    --amber:#C8852A; --amber-light:#FFF4E0; --amber-border:#F5CCA0;
    --red:#E05252; --red-light:#FDE8E8;
    --blue:#3A7BD5; --blue-light:#E6F1FF;
    --text:#1A1A1A; --text-muted:#888; --border:#EFEFEF;
    --bg:#F4F4F0; --card:#FFFFFF; --radius:18px;
  }
  body {
    font-family:'Plus Jakarta Sans',sans-serif;
    background:var(--bg);
    width:375px; margin:0 auto;
    overflow-x:hidden;
    padding-bottom:40px;
  }

  /* Status Bar */
  .status-bar { display:flex; justify-content:space-between; align-items:center; padding:14px 20px 4px; font-size:15px; font-weight:700; color:var(--text); }
  .status-icons { display:flex; align-items:center; gap:5px; }
  .signal-bars { display:flex; align-items:flex-end; gap:2px; }
  .sbar { width:3px; border-radius:1px; background:var(--text); }

  /* Header */
  .header { display:flex; justify-content:space-between; align-items:center; padding:10px 20px 14px; }
  .location-row { display:flex; align-items:center; gap:10px; }
  .loc-bubble { width:40px; height:40px; border-radius:50%; background:var(--green-light); display:flex; align-items:center; justify-content:center; }
  .loc-bubble svg { width:20px; height:20px; }
  .loc-city { font-size:17px; font-weight:700; color:var(--text); line-height:1.2; }
  .loc-date { font-size:12px; color:var(--text-muted); margin-top:1px; }
  .edit-icon svg { width:22px; height:22px; }

  /* ── STREAK CARD ── */
  .streak-card {
    margin:0 16px 14px;
    background:var(--card);
    border-radius:var(--radius);
    padding:18px 18px 16px;
    box-shadow:0 2px 12px rgba(0,0,0,.06);
  }

  /* Top row: icon + count + ring */
  .streak-top { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
  .plant-circle {
    width:52px; height:52px; border-radius:50%;
    background:var(--green-light);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .plant-circle svg { width:28px; height:28px; }
  .streak-text { flex:1; }
  .streak-num { font-size:22px; font-weight:800; color:var(--text); line-height:1.1; }
  .streak-sub { font-size:13px; color:var(--text-muted); margin-top:2px; }

  /* Progress ring */
  .ring-wrap { position:relative; width:72px; height:72px; flex-shrink:0; }
  .ring-wrap svg { transform:rotate(-90deg); }
  .ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring-pct { font-size:16px; font-weight:800; color:var(--text); line-height:1; }
  .ring-lbl { font-size:8px; color:var(--text-muted); margin-top:2px; text-align:center; line-height:1.3; }

  /* ── Day dots grid ── */
  .dots-section { }
  .dots-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .dots-label { font-size:11px; font-weight:600; color:var(--text-muted); }
  .dots-nav { display:flex; align-items:center; gap:6px; }
  .dots-nav-btn { width:22px; height:22px; border-radius:50%; background:var(--bg); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .dots-nav-btn svg { width:11px; height:11px; }
  .dots-month { font-size:11px; font-weight:700; color:var(--text); }

  /* Days of week header */
  .days-of-week { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:5px; }
  .dow { text-align:center; font-size:9px; font-weight:700; color:var(--text-muted); }
  .dow.today-col { color:var(--green); }

  /* The dots grid */
  .dots-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }

  .day-dot {
    aspect-ratio:1;
    border-radius:50%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    cursor:pointer;
    position:relative;
    transition:transform .12s;
    gap:1px;
  }
  .day-dot:hover { transform:scale(1.15); }
  .day-dot .dd-num { font-size:10px; font-weight:700; line-height:1; }
  .day-dot .dd-dots { display:flex; gap:1.5px; margin-top:1px; }
  .day-dot .dd-dots span { width:3px; height:3px; border-radius:50%; background:currentColor; opacity:.7; }

  /* States */
  .dd-full     { background:var(--green); color:#fff; }
  .dd-partial  { background:var(--amber-light); color:var(--amber); border:1.5px solid var(--amber-border); }
  .dd-missed   { background:var(--red-light); color:var(--red); border:1.5px solid #F5C2C2; }
  .dd-special  { background:#EDE9FE; color:#7C3AED; border:1.5px solid #C4B5FD; }
  .dd-today    { background:var(--green); color:#fff; box-shadow:0 0 0 3px var(--green-light), 0 0 0 5px var(--green); }
  .dd-today-partial { background:var(--amber-light); color:var(--amber); border:2px solid var(--amber); box-shadow:0 0 0 3px var(--amber-light); }
  .dd-future   { background:var(--border); color:#ccc; cursor:default; }
  .dd-future:hover { transform:none; }
  .dd-empty    { background:transparent; cursor:default; }
  .dd-empty:hover { transform:none; }

  /* Legend */
  .legend { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
  .legend-item { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--text-muted); font-weight:500; }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  /* Tooltip popup */
  .tooltip-overlay {
    display:none;
    position:fixed; inset:0;
    background:rgba(0,0,0,.3);
    z-index:100;
    align-items:flex-end;
    justify-content:center;
    padding-bottom:0;
  }
  .tooltip-overlay.show { display:flex; }
  .tooltip-sheet {
    background:var(--card);
    width:375px;
    border-radius:20px 20px 0 0;
    padding:20px 20px 32px;
    box-shadow:0 -4px 30px rgba(0,0,0,.15);
    animation:slideUp .22s ease-out;
  }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
  .tooltip-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
  .tooltip-date { font-size:15px; font-weight:800; color:var(--text); margin-bottom:4px; }
  .tooltip-summary { font-size:12px; color:var(--text-muted); margin-bottom:16px; }
  .tooltip-prayers { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
  .tp-row { display:flex; align-items:center; gap:10px; }
  .tp-icon { width:30px; height:30px; border-radius:50%; border:1.5px solid var(--border); background:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .tp-icon svg { width:14px; height:14px; }
  .tp-name { flex:1; font-size:13px; font-weight:600; color:var(--text); }
  .tp-badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
  .tp-done    { background:var(--green-light); color:var(--green); }
  .tp-kaza    { background:var(--blue-light);  color:var(--blue); }
  .tp-missed  { background:var(--red-light);   color:var(--red); }
  .tp-special { background:#EDE9FE; color:#7C3AED; }
  .tooltip-action {
    width:100%; padding:13px;
    background:var(--amber);
    border:none; border-radius:12px;
    font-family:inherit; font-size:14px; font-weight:800; color:#fff;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .tooltip-action svg { width:17px; height:17px; }
  .tooltip-action.all-done {
    background:var(--green-light);
    color:var(--green);
  }

  /* Divider label */
  .section-divider { padding:4px 20px 12px; font-size:13px; font-weight:700; color:var(--text-muted); }

  /* Mini prayer list preview */
  .prayer-preview {
    margin:0 16px 12px;
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:0 2px 10px rgba(0,0,0,.06);
    overflow:hidden;
    opacity:.4;
  }
</style>
</head>

// ── Day data for May 2025 ──
// May 1 = Thursday = index 3 in Mon-first week
const PRAYERS = ['Sabah','Öğle','İkindi','Akşam','Yatsı'];
const PRAYER_ICONS = [
  `<svg viewBox="0 0 24 24" fill="none" stroke="#2A9D5C" stroke-width="1.8" stroke-linecap="round"><path d="M17 18a5 5 0 00-10 0"/><line x1="12" y1="2" x2="12" y2="9"/><line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/><line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/><line x1="3" y1="22" x2="21" y2="22"/></svg>`,

// type: 'full'|'partial'|'missed'|'special'|'today'|'today-partial'|'future'|'empty'
// prayers: array of 'done'|'kaza'|'missed' per prayer

function buildGrid() {
  const grid = document.getElementById('dots-grid');
  grid.innerHTML = '';
  days.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'day-dot';
    if (d.type === 'empty') {
      el.className += ' dd-empty';
      el.style.pointerEvents = 'none';
      grid.appendChild(el);
      return;
    }
    if (d.type === 'future') {
      el.className += ' dd-future';
      el.innerHTML = `<div class="dd-num">${d.num}</div>`;
      grid.appendChild(el);
      return;
    }
    const stateClass = {
      'full': 'dd-full',
      'partial': 'dd-partial',
      'missed': 'dd-missed',
      'special': 'dd-special',
      'today': 'dd-today',
      'today-partial': 'dd-today-partial',
    }[d.type] || 'dd-future';
    el.className += ` ${stateClass}`;

    // Count missed prayers for dot indicators
    const missedCount = d.prayers ? d.prayers.filter(p => p === 'missed').length : 0;
    const dotsHtml = missedCount > 0 && d.type !== 'full' && d.type !== 'today'
      ? `<div class="dd-dots">${Array(Math.min(missedCount,3)).fill('<span></span>').join('')}</div>`
      : '';
    el.innerHTML = `<div class="dd-num">${d.num}</div>${dotsHtml}`;
    el.onclick = () => showTooltip(d);
    grid.appendChild(el);
  });
}

function showTooltip(day) {
  if (day.type === 'future' || day.type === 'empty') return;
  const overlay = document.getElementById('tooltip');
  const ttDate = document.getElementById('tt-date');
  const ttSummary = document.getElementById('tt-summary');
  const ttPrayers = document.getElementById('tt-prayers');
  const ttAction = document.getElementById('tt-action');
  const ttActionLabel = document.getElementById('tt-action-label');

  const dayNames = {'Pzt':'Pazartesi','Sal':'Salı','Çar':'Çarşamba','Per':'Perşembe','Cum':'Cuma','Cmt':'Cumartesi','Paz':'Pazar'};
  ttDate.textContent = `${day.num} Mayıs 2025 · ${dayNames[day.day] || day.day}`;

  const missedPrayers = day.prayers ? day.prayers.filter(p => p === 'missed') : [];
  const donePrayers   = day.prayers ? day.prayers.filter(p => p === 'done') : [];
  const pendingPrayers = day.prayers ? day.prayers.filter(p => p === 'pending') : [];

  if (day.type === 'full') {
    ttSummary.textContent = 'Tüm namazlar kılındı ✓';
  } else if (day.type === 'special') {
    ttSummary.textContent = 'Özel gün — seri korudu';
  } else if (day.type === 'today' || day.type === 'today-partial') {
    ttSummary.textContent = `Bugün: ${donePrayers.length}/5 namaz kılındı`;
  } else if (day.type === 'missed') {
    ttSummary.textContent = 'Bu gün hiç namaz kılınmadı';
  } else {
    ttSummary.textContent = `${donePrayers.length}/5 namaz kılındı · ${missedPrayers.length} eksik`;
  }

  // Build prayer rows
  if (day.prayers) {
    ttPrayers.innerHTML = PRAYERS.map((name, i) => {
      const state = day.prayers[i];
      let badgeClass, badgeLabel;
      if (state === 'done')    { badgeClass = 'tp-done';    badgeLabel = 'Kılındı'; }
      else if (state === 'kaza')    { badgeClass = 'tp-kaza';    badgeLabel = 'Kaza kılındı'; }
      else if (state === 'special') { badgeClass = 'tp-special'; badgeLabel = 'Özel gün'; }
      else if (state === 'pending') { badgeClass = 'tp-missed';  badgeLabel = 'Henüz kılınmadı'; }
      else                          { badgeClass = 'tp-missed';  badgeLabel = 'Kılınmadı'; }
      return `<div class="tp-row">
        <div class="tp-icon">${PRAYER_ICONS[i]}</div>
        <div class="tp-name">${name}</div>
        <div class="tp-badge ${badgeClass}">${badgeLabel}</div>
      </div>`;
    }).join('');
  } else {
    ttPrayers.innerHTML = '';
  }

  // Action button
  const hasMissed = day.prayers && day.prayers.some(p => p === 'missed');
  const hasPending = day.prayers && day.prayers.some(p => p === 'pending');
  if (day.type === 'full') {
    ttAction.className = 'tooltip-action all-done';
    ttActionLabel.textContent = 'Mükemmel bir gün!';
  } else if (day.type === 'special') {
    ttAction.className = 'tooltip-action all-done';
    ttActionLabel.textContent = 'Özel gün olarak işaretlendi';
  } else if (hasPending) {
    ttAction.className = 'tooltip-action';
    ttAction.style.background = 'var(--green)';
    ttActionLabel.textContent = 'Bugünü işaretle';
  } else if (hasMissed) {
    ttAction.className = 'tooltip-action';
    ttAction.style.background = 'var(--amber)';
    ttActionLabel.textContent = 'Kaza namazlarını işaretle →';
  } else {
    ttAction.className = 'tooltip-action all-done';
    ttActionLabel.textContent = 'Tamamlandı';
  }

  overlay.classList.add('show');
}

function closeTooltip(e) {
  if (e.target === document.getElementById('tooltip')) {
    document.getElementById('tooltip').classList.remove('show');
  }
}

function goToHizliIsaretle() {
  document.getElementById('tooltip').classList.remove('show');
  // In real app: navigate to Hızlı İşaretle pre-loaded with selected date
}

buildGrid();
</script>
