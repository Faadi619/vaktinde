<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<title>Prayer App – Ana Sayfa</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:       #2A9D5C;
    --green-dark:  #1F7A45;
    --green-light: #E8F5EE;
    --green-mid:   #A8D5B5;
    --orange:      #F47B2B;
    --orange-bg:   #FFF0E6;
    --text:        #1A1A1A;
    --text-muted:  #888;
    --border:      #EFEFEF;
    --bg:          #F4F4F0;
    --card:        #FFFFFF;
    --radius:      18px;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    width: 375px;
    margin: 0 auto;
    min-height: 812px;
    overflow-x: hidden;
  }

  /* ── Status Bar ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px 4px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .status-icons { display: flex; align-items: center; gap: 5px; }
  .signal-bars { display: flex; align-items: flex-end; gap: 2px; }
  .bar { width: 3px; border-radius: 1px; background: var(--text); }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px 14px;
  }
  .location-row { display: flex; align-items: center; gap: 10px; }
  .loc-bubble {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
  }
  .loc-bubble svg { width: 20px; height: 20px; }
  .loc-city { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .loc-date { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .edit-icon { color: var(--green); }
  .edit-icon svg { width: 22px; height: 22px; }

  /* ── Countdown Hero Card ── */
  .hero-card {
    margin: 0 16px 12px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 20px 0;
    overflow: hidden;
    position: relative;
    min-height: 190px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .hero-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-muted); font-weight: 500;
    margin-bottom: 8px;
  }
  .hero-label svg { width: 20px; height: 20px; color: var(--green); }
  .hero-big { font-size: 34px; font-weight: 800; color: var(--text); line-height: 1.1; }
  .hero-big span { color: var(--green); }
  .hero-time { margin-top: 10px; font-size: 14px; color: var(--text-muted); font-weight: 500; margin-bottom: 16px; }
  .hero-time strong { color: var(--green); font-weight: 700; }

  /* Mosque SVG illustration */
  .mosque-wrap {
    position: absolute;
    right: 0; bottom: 0;
    width: 210px; height: 155px;
    overflow: hidden;
  }

  /* ── Streak Card ── */
  .streak-card {
    margin: 0 16px 12px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
    transition: background .12s;
  }
  .streak-card:hover { background: #fafafa; }
  .fire-circle {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .fire-circle svg { width: 28px; height: 28px; }
  .streak-num { font-size: 22px; font-weight: 800; color: var(--text); }
  .streak-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  /* ── Prayer List Card ── */
  .prayer-card {
    margin: 0 16px 12px;
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .prayer-row {
    display: flex;
    align-items: center;
    padding: 15px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    cursor: pointer;
    transition: background .1s;
  }
  .prayer-row:last-child { border-bottom: none; }
  .prayer-row:hover { background: #fafafa; }

  /* Prayer icon circles */
  .p-icon {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1.5px solid var(--green-light);
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .p-icon svg { width: 22px; height: 22px; }

  .p-name { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; }

  /* Sabah special — imsak/güneş sub-times */
  .p-times-group { display: flex; flex-direction: column; gap: 2px; margin-right: 8px; }
  .p-sub-time {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--text-muted);
  }
  .p-sub-time svg { width: 13px; height: 13px; }
  .p-sub-label { font-weight: 500; }

  .p-time { font-size: 15px; color: var(--text-muted); font-weight: 500; margin-right: 12px; }

  /* Buttons */
  .p-btn {
    padding: 9px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    border: 2px solid var(--green);
    white-space: nowrap;
    transition: all .15s;
  }
  .p-btn.done {
    background: var(--green-light);
    color: var(--green);
    border-color: transparent;
  }
  .p-btn.todo {
    background: transparent;
    color: var(--green);
  }
  .p-btn.todo:hover { background: var(--green-light); }
  .p-btn.done:hover { background: #d4ecde; }

  /* ── Special Day Card ── */
  .special-card {
    margin: 0 16px 16px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .special-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--green-light);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 22px;
  }
  .special-title { font-size: 16px; font-weight: 700; color: var(--text); flex: 1; }

  /* Toggle */
  .toggle { position: relative; width: 50px; height: 28px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .tog-track {
    position: absolute; inset: 0;
    background: #D0D0D0; border-radius: 28px;
    transition: background .2s; cursor: pointer;
  }
  .tog-thumb {
    position: absolute;
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; top: 3px; left: 3px;
    transition: transform .2s;
    box-shadow: 0 1px 4px rgba(0,0,0,.2);
    pointer-events: none;
  }
  .toggle input:checked ~ .tog-track { background: var(--green); }
  .toggle input:checked ~ .tog-thumb { transform: translateX(22px); }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: sticky; bottom: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 10px 0 24px;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    font-size: 11px; color: #BBBBBB; font-weight: 500; cursor: pointer;
    transition: color .15s;
  }
  .nav-item.active { color: var(--green); }
  .nav-item svg { width: 24px; height: 24px; }
  .nav-fab-wrap {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 4px; cursor: pointer;
  }
  .nav-fab {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--green);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(42,157,92,.4);
    margin-top: -18px;
    transition: transform .15s;
  }
  .nav-fab:hover { transform: scale(1.07); }
  .nav-fab svg { width: 22px; height: 22px; }
  .nav-fab-label { font-size: 11px; color: #BBBBBB; font-weight: 500; margin-top: 2px; }

  /* ── Mosque SVG illustration ── */
  .mosque-svg { width: 210px; height: 155px; }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
  <span>9:41</span>
  <div class="status-icons">

<!-- Header -->

<!-- Hero Countdown Card -->
<div class="hero-card">
  <div class="hero-label">
    <svg viewBox="0 0 24 24" fill="none" stroke="#2A9D5C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      <polyline points="12 6 12 12 16 14"/>
    </svg>
    Sonraki Vakit
  </div>
  <div class="hero-big">
    İkindiye<br>
    <span>18 dakika</span><br>
    kaldı
  </div>

  <!-- Mosque illustration — flat monochromatic silhouette -->
  <div class="mosque-wrap">
    <svg class="mosque-svg" viewBox="0 0 220 170" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1">
          <stop offset="55%" stop-color="#fff" stop-opacity="0"/>
          <stop offset="100%" stop-color="#fff" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">

      <circle cx="178" cy="30" r="26" fill="#B7DEC5" opacity=".5"/>

      <!-- Birds (simple V strokes) -->

      <!-- Background rolling hills -->

      <ellipse cx="185" cy="162" rx="65" ry="22" fill="#C5E2CF" opacity=".38"/>

      <path d="M63 150 L63 132 Q69 122 75 132 L75 150 Z" fill="#fff" opacity=".25"/>
      <path d="M82 150 L82 132 Q88 122 94 132 L94 150 Z" fill="#fff" opacity=".25"/>
      <path d="M101 150 L101 132 Q107 122 113 132 L113 150 Z" fill="#fff" opacity=".25"/>

      <!-- Side smaller domes flanking main dome -->
      <path d="M28 104 Q38 88 48 104" fill="#6BBD8D"/>
      <path d="M108 104 Q118 88 128 104" fill="#6BBD8D"/>

      <!-- Main central dome -->
      <path d="M36 104 Q78 52 120 104" fill="#5CB37E"/>

<script>
/* Prayer row toggle */
function toggle(row) {
  const btn = row.querySelector('.p-btn');
  if (btn.classList.contains('done')) {
    btn.classList.remove('done'); btn.classList.add('todo');
    btn.textContent = 'Kıldım';
    row.querySelector('.p-icon').style.borderColor = '#E8F5EE';
  } else {
    btn.classList.remove('todo'); btn.classList.add('done');
    btn.textContent = '✓ Kılındı';
    row.querySelector('.p-icon').style.borderColor = '#2A9D5C';
    btn.style.transform = 'scale(1.12)';
    setTimeout(() => btn.style.transform = '', 180);
  }
}

/* Special day toggle */
function toggleSpecial(el) {
  el.closest('.special-card').style.background = el.checked ? '#E8F5EE' : '#fff';
}

/* Streak card → navigate to monthly statistics */
function goToMonthly() {

}
