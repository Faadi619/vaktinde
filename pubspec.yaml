name: vaqt
description: "Vaqt — Islamic prayer habit tracking app for Turkish Muslims."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  firebase_messaging: ^15.2.5

  # Auth
  google_sign_in: ^6.2.2

  # State Management
  provider: ^6.1.5

  # Navigation
  go_router: ^14.8.1

  # Local Storage / Caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  http: ^1.4.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  permission_handler: ^11.4.0

  # Compass / Sensors
  sensors_plus: ^6.1.1
  flutter_compass: ^0.8.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # UI
  fl_chart: ^0.69.0
  cupertino_icons: ^1.0.8

  # Serialization
  json_annotation: ^4.9.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_svg: ^2.1.0
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/static/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/static/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/static/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/static/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/static/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/static/PlusJakartaSans-ExtraBold.ttf
          weight: 800

# The following section is specific to Flutter packages.
